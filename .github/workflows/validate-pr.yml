name: Validate Plugin Pull Request

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'plugins/**.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Validation Script
        run: node validate-plugin.js
